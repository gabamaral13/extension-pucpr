<!DOCTYPE html>
<html lang="pt-BR">

    <link

  <body>
    <div class="corpo">
      <div class="container_">
        <img class="logo" src="../../css/imagens/x.png" alt="Logo X-Triagem" />
        <h1 class="titulo">Bem-vindo, Admin</h1>
      </div>

      <div class="corpo_">
        <div class="navegador">
          <div class="dash">
            <h3>Navegador</h3>
          </div>

          <a href="./dashboard_medico.html">
            <button class="botoes_areas" type="button">Dashboard</button>
          </a>
          <br />

          <a href="./pacientes_medico.html">
            <button class="botoes_areas" type="button">Pacientes</button>
          </a>
          <br />

          <a href="./avaliacao_medico.html">
            <button class="botoes_areas" type="button">Avaliações</button>

            </div>

            <div>
              <button class="botao_imprimir" type="button">Imprimir</button>
            </div>
          </div>

          <hr />
          <br />

          <div class="corp">
            <div class="selecionar_paciente">
              <h5>Selecionar Paciente</h5>

              <div class="paciente">
                <p>Paciente</p>
                <input type="text" placeholder="Selecionar paciente" />
              </div>
            </div>

            <div class="historico_avaliacao"></div>
          </div>
        </div>
