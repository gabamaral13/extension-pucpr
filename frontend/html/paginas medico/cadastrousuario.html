<html>
  <head>
    <meta charset="UTF-8" />
    <link
      rel="stylesheet"
      href="/frontend/css/paginas medico/cadastrouser.css"
    />
    <script type="javascript" src="/frontend/javascript/index.js"></script>
  </head>

  <body>
    <div class="corpo">
      <form onsubmit="fazerCadastro(event)">
        <h1 class="titulo">Cadastro de usuário</h1>
        <div class="dados">
          <input id="nome" type="text" placeholder="Nome" />
          <input id="email" type="text" placeholder="E-mail" />
          <input id="cpf" type="number" placeholder="CPF" />
          <input id="email" type="text" placeholder="E-mail" />
          <input id="senha" type="password" placeholder="Senha" />
          <input
            id="confirmsenha"
            type="password"
            placeholder="Confirmar Senha"
          />
        </div>

        <div class="botao_cadastro">
          <button type="submit">Cadastrar</button>
        </div>
      </form>
    </div>
  </body>
</html>
