<html>
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="./../../css/paginas medico/cadastrouser.css" />
    <script type="javascript" src="/frontend/javascript/index.js"></script>
  </head>

  <body>
    <div class="corpo">
      <form onsubmit="fazerCadastro(event)">
        <h1 class="titulo">Cadastro de usuário</h1>
        <div class="dados">
          <div class="dados_pessoais">
            <h5>Dados Pessoais</h5>
            <input id="nome" type="text" placeholder="Nome" />
            <input id="email" type="text" placeholder="E-mail" />
            <input id="cpf" type="number" placeholder="CPF" />
            <input id="email" type="text" placeholder="E-mail" />
          </div>

          <div class="senha">
            <h5>Criar Senha</h5>
            <input id="senha" type="password" placeholder="Senha" />
            <input
              id="confirmsenha"
              type="password"
              placeholder="Confirmar Senha"
            />
          </div>
        </div>

        <div>
          <button class="botao_cadastro" type="submit">Cadastrar</button>
        </div>
      </form>
    </div>
  </body>
</html>
