<html>
  <head>
    <meta charset="UTF-8" />
    <link rel="stylecss" href="/frontend/css/paginamedico.css" />
    <script type="javascript" src="/frontend/javascript/index.js"></script>
  </head>

  <body>
    <div class="corpo">
      <div class="topo">
        <h1 class="titulo">Bem-Vindo, Admin</h1>
      </div>

      <div class="navegador">
        <button class="botoes_areas" type="button" id="">dashboard</button>
        <button class="botoes_areas" type="button" id="">pacientes</button>
        <button class="botoes_areas" type="button" id="">avaliacao</button>
        <button class="botoes_areas" type="button" id="">historico</button>
        <button class="botoes_areas" type="button" id="">relatorios</button>
        <button class="botoes_areas" type="button" id="">usuarios</button>
      </div>

      <div class="areabase">
        <div class="dashboard">
          <div class="graficos"></div>

          <div class="acoes"></div>

          <div class="sistema"></div>
        </div>

        <div class="pacientes">
          <div class="buscar_paciente">
            <input id="busca_paciente" type="text" placeholder="Buscar" />
          </div>

          <div class="lista_pacientes"></div>
        </div>

        <div class="avaliacao">
          <div class="escolha_paciente">
            <input type="text" placeholder="Selecionar paciente" />
          </div>

          <div class="avaliacao_paciente"></div>
        </div>

        <div class="historico">
          <div class="selecionar_paciente">
            <button type="button" class="botoes"></button>
          </div>

          <div class="lista_paciente"></div>
        </div>

        <div class="relatorios">
          <div class="filtros"></div>

          <div class="lista_relatorios"></div>
        </div>

        <div class="usuarios">
          <button type="submit" class="botoes">Cadastar usuário</button>
          <div class="buscar_usuario"></div>

          <div class="usuarios"></div>
        </div>
      </div>
    </div>
  </body>
</html>
