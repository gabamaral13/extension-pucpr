<html>
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="../css/loginstyle.css" />
    <script type="javascript" src="/frontend/javascript/index.js"></script>
  </head>

  <body>
    <div class="corpo">
      <form onsubmit="fazerLogin(event)">
        <div class="titulo">
          <h1>Login</h1>
        </div>
        <div class="dados">
          <input id="email" type="text" placeholder="E-mail" />
          <input id="senha" type="password" placeholder="Senha" />
        </div>

        <div>
          <button class="botao_log" type="submit" id="fazerLogin">
            Entrar
          </button>
        </div>
      </form>
    </div>
  </body>
</html>
