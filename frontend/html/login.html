<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Login - X-Triagem</title>

    <link rel="stylesheet" href="../css/loginstyle.css" />
    <script src="../javascript/index.js" defer></script>
  </head>

  <body>
    <div class="corpo">
      <form class="formulario_login" onsubmit="fazerLogin(event)">
        <div class="titulo">
          <h1>Login</h1>
        </div>

        <div class="dados">
          <input
            id="email"
            type="text"
            placeholder="E-mail ou usuário"
            autocomplete="username"
            required
          />

          <input
            id="senha"
            type="password"
            placeholder="Senha"
            autocomplete="current-password"
            required
          />
        </div>

        <div>
          <button class="botao_log" type="submit">
            Entrar
          </button>
        </div>
      </form>
    </div>
  </body>
</html>
