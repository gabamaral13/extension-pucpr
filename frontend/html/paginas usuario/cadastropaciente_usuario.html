<html>
  <head>
    <meta charset="UTF-8" />
    <link
      rel="stylesheet"
      href="./../../css/paginas usuario/cadastropaciente_usuario.css"
    />
    <script type="javascript" src="/frontend/javascript/index.js"></script>
  </head>

  <body>
    <div class="corpo">
      <div class="container_">
        <img class="logo" src="/frontend/css/imagens/x.png" />
        <h1 class="titulo">Bem vindo, user</h1>
      </div>

      <div class="corpo_">
        <div class="navegador">
          <div class="dash">
            <h3>Navegador</h3>
          </div>
          <a href="/frontend/html/paginas medico/dashboard_medico.html">
            <button class="botoes_areas" type="button">DashBoard</button> </a
          ><br />

          <a href="/frontend/html/paginas medico/pacientes_medico.html">
            <button class="botoes_areas" type="button">Pacientes</button> </a
          ><br />

          <a href="/frontend/html/paginas medico/relatorios_medico.html">
            <button class="botoes_areas" type="button">Relatórios</button> </a
          ><br />

          <div class="user_"></div>
        </div>

        <div class="cadastro_pacientes">
          <h3>Informações do Paciente</h3>

          <div class="geral">
            <div class="dados">
              <div class="dados_pessoais">
                <h5>Dados pessoais</h5>
                <input
                  id="nome"
                  type="text"
                  placeholder="Nome Completo"
                /><br />
                <input id="cpf" type="number" placeholder="CPF" /><br />
                <input
                  id="data"
                  type="date"
                  placeholder="Data de Nascimento"
                /><br />
                <input id="sexo" type="text" placeholder="Sexo" /><br />
              </div>
              <hr />
              <div class="endereco_paciente">
                <h5>Endereço do Paciente</h5>
                <input id="enderco" type="text" placeholder="Endereço" /><br />
                <input id="cidade" type="text" placeholder="Cidade" /><br />
                <div class="pais">
                  <input id="cep" type="number" placeholder="CEP" />
                  <input id="estado" type="text" placeholder="Estado" />
                </div>
              </div>
            </div>

            <div>
              <hr class="vertical" />
            </div>

            <div class="info">
              <h5>Informações do Paciente</h5>
              <br />
              <div class="infor_paciente">
                <input type="text" placeholder="Informações" />
              </div>
            </div>
          </div>

          <div>
            <button class="botao_cadastrar" type="button">
              Cadastrar Novo Paciente
            </button>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
